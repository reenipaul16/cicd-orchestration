name: Deploy Helm to GKE

on:
  repository_dispatch:
    types: [helm-deploy]
  
permissions:
      contents: read
      id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/489414658403/locations/global/workloadIdentityPools/github/providers/application'
          service_account: 'sa-application@project-06cede75-fb8e-4bfb-984.iam.gserviceaccount.com'

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: 'as-cluster'
          location: 'asia-south1-a'

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy
        run: |
          helm upgrade --install frontend-app ./helm \
            --namespace app